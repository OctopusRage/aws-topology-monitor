<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="titleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7c9d6"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6d5a"/>
      <stop offset="100%" stop-color="#7b6cff"/>
    </linearGradient>
    <linearGradient id="elbPill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b1c22"/>
      <stop offset="100%" stop-color="#191b28"/>
    </linearGradient>
    <radialGradient id="tg" cx="34%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#a99cff"/>
      <stop offset="100%" stop-color="#6a5bff"/>
    </radialGradient>
    <radialGradient id="elbDot" cx="34%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffc0ad"/>
      <stop offset="100%" stop-color="#ff6d5a"/>
    </radialGradient>
    <radialGradient id="glowCoral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6d5a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6d5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b6cff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7b6cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.3" fill="#191b26"/>
    </pattern>
    <style>
      .edge { fill:none; stroke:url(#edge); stroke-width:2.4; opacity:.7; stroke-dasharray:2 10; stroke-linecap:round; animation: flow 1.3s linear infinite; }
      @keyframes flow { to { stroke-dashoffset:-24; } }
      .tg { animation: pulse 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pulse { 0%,100%{ opacity:.92 } 50%{ opacity:1 } }
      .glow { animation: breathe 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes breathe { 0%,100%{ opacity:.5; transform:scale(1) } 50%{ opacity:.75; transform:scale(1.1) } }
      .srv { animation: blink 2.6s ease-in-out infinite; }
      @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:.4 } }
      .spark { stroke-dasharray: 240; stroke-dashoffset: 240; animation: draw 3.2s ease-in-out infinite; }
      @keyframes draw { 0%{ stroke-dashoffset:240 } 55%,100%{ stroke-dashoffset:0 } }
      .title { fill:url(#titleFill); font-size:48px; font-weight:800; letter-spacing:-0.5px; }
      .sub { fill:#9498ab; font-size:18px; }
      .chip { fill:#14161f; stroke:#292c3d; }
      .chipt { fill:#c9ccdb; font-size:13px; font-weight:600; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="400" rx="18" fill="#0b0c13"/>
  <rect width="1200" height="400" rx="18" fill="url(#dots)"/>
  <ellipse cx="880" cy="200" rx="360" ry="260" fill="url(#glowPurple)"/>
  <ellipse cx="690" cy="200" rx="220" ry="200" fill="url(#glowCoral)"/>
  <rect x="1" y="1" width="1198" height="398" rx="17" fill="none" stroke="#20222e"/>

  <!-- ── left: brand ── -->
  <g transform="translate(72,120)">
    <!-- logo mark: topology glyph -->
    <g transform="translate(0,-42)">
      <rect x="0" y="0" width="52" height="52" rx="13" fill="#101019" stroke="#2a2d3e"/>
      <path d="M17 26 L36 15 M17 26 L36 37" stroke="#7b6cff" stroke-width="2.6" stroke-linecap="round" opacity="0.7"/>
      <circle cx="16" cy="26" r="6.5" fill="#ff6d5a"/>
      <circle cx="37" cy="15" r="4.6" fill="#7b6cff"/>
      <circle cx="37" cy="37" r="4.6" fill="#7b6cff"/>
    </g>

    <text class="title" x="70" y="4">AWS Topology Monitor</text>
    <text class="sub" x="72" y="38">Visualize &amp; monitor your AWS infrastructure — live.</text>

    <!-- chips -->
    <g transform="translate(72,68)">
      <g><rect class="chip" x="0" y="0" width="164" height="30" rx="15"/><text class="chipt" x="16" y="20">Neural · Radial · Grid</text></g>
      <g transform="translate(176,0)"><rect class="chip" x="0" y="0" width="158" height="30" rx="15"/><text class="chipt" x="16" y="20">RDS · EC2 · Cache · TG</text></g>
    </g>
    <g transform="translate(72,108)">
      <g><rect class="chip" x="0" y="0" width="184" height="30" rx="15"/><text class="chipt" x="16" y="20">CloudWatch · Prometheus</text></g>
      <g transform="translate(196,0)"><rect class="chip" x="0" y="0" width="138" height="30" rx="15"/><text class="chipt" x="16" y="20">Save · Share · Export</text></g>
    </g>

    <!-- live sparkline -->
    <g transform="translate(72,162)">
      <circle cx="5" cy="1" r="4" fill="#38d39f"/>
      <text class="sub" x="18" y="6" font-size="12.5" fill="#38d39f">live metrics</text>
      <path class="spark" d="M108 4 L130 -9 L152 3 L174 -13 L196 -3 L218 -17 L240 -6 L262 -15 L284 -8"
            fill="none" stroke="#38d39f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ── right: topology ── -->
  <g>
    <!-- ELB glow + pill -->
    <circle class="glow" cx="700" cy="200" r="52" fill="url(#glowCoral)"/>
    <g>
      <rect x="630" y="171" width="160" height="60" rx="30" fill="url(#elbPill)" stroke="#4d2c31"/>
      <circle cx="664" cy="201" r="18" fill="url(#elbDot)"/>
      <path d="M657 201 h14 M664 194 v14" stroke="#241318" stroke-width="2.6" stroke-linecap="round"/>
      <text x="691" y="197" fill="#eef0f6" font-size="15" font-weight="700">prod-alb</text>
      <text x="691" y="215" fill="#8a8fa3" font-size="11">internet-facing</text>
    </g>

    <!-- edges ELB → target groups -->
    <path class="edge" d="M790 201 C880 150, 900 96, 966 92"  style="animation-delay:0s"/>
    <path class="edge" d="M790 201 C880 178, 900 156, 966 156" style="animation-delay:.16s"/>
    <path class="edge" d="M790 201 C880 224, 900 244, 966 244" style="animation-delay:.32s"/>
    <path class="edge" d="M790 201 C880 250, 900 304, 966 308" style="animation-delay:.48s"/>

    <!-- target groups + servers -->
    <g>
      <circle class="tg" cx="988" cy="92" r="23" fill="url(#tg)"/>
      <text x="988" y="98" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">3</text>
      <line x1="1011" y1="86" x2="1078" y2="80" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <line x1="1011" y1="98" x2="1078" y2="106" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <circle class="srv" cx="1084" cy="80" r="6.5" fill="#38d39f" style="animation-delay:.1s"/>
      <circle class="srv" cx="1084" cy="106" r="6.5" fill="#38d39f" style="animation-delay:.6s"/>
    </g>
    <g>
      <circle class="tg" cx="988" cy="156" r="23" fill="url(#tg)" style="animation-delay:.4s"/>
      <text x="988" y="162" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">2</text>
      <line x1="1011" y1="150" x2="1078" y2="146" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <line x1="1011" y1="162" x2="1078" y2="170" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <circle class="srv" cx="1084" cy="146" r="6.5" fill="#38d39f" style="animation-delay:.3s"/>
      <circle class="srv" cx="1084" cy="170" r="6.5" fill="#ffb547" style="animation-delay:.9s"/>
    </g>
    <g>
      <circle class="tg" cx="988" cy="244" r="23" fill="url(#tg)" style="animation-delay:.8s"/>
      <text x="988" y="250" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">2</text>
      <line x1="1011" y1="238" x2="1078" y2="234" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <line x1="1011" y1="250" x2="1078" y2="258" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <circle class="srv" cx="1084" cy="234" r="6.5" fill="#38d39f" style="animation-delay:.5s"/>
      <circle class="srv" cx="1084" cy="258" r="6.5" fill="#38d39f" style="animation-delay:1.1s"/>
    </g>
    <g>
      <circle class="tg" cx="988" cy="308" r="23" fill="url(#tg)" style="animation-delay:1.2s"/>
      <text x="988" y="314" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">4</text>
      <line x1="1011" y1="302" x2="1078" y2="298" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <line x1="1011" y1="314" x2="1078" y2="322" stroke="#7b6cff" stroke-width="1.4" opacity=".4"/>
      <circle class="srv" cx="1084" cy="298" r="6.5" fill="#00b8d9" style="animation-delay:.2s"/>
      <circle class="srv" cx="1084" cy="322" r="6.5" fill="#38d39f" style="animation-delay:.8s"/>
    </g>
  </g>
</svg>
