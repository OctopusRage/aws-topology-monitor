<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="elbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6d5a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff6d5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="elbPill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1b1f"/>
      <stop offset="100%" stop-color="#1c1f2e"/>
    </linearGradient>
    <radialGradient id="tg" cx="32%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#a99cff"/>
      <stop offset="100%" stop-color="#7b6cff"/>
    </radialGradient>
    <radialGradient id="elbDot" cx="32%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffb59e"/>
      <stop offset="100%" stop-color="#ff6d5a"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.4" fill="#20222e"/>
    </pattern>
    <style>
      .edge { fill:none; stroke:#ff6d5a; stroke-width:2; opacity:.55; stroke-dasharray:7 9; animation: flow 1.1s linear infinite; }
      .slink { fill:none; stroke:#7b6cff; stroke-width:1.6; opacity:.4; }
      @keyframes flow { to { stroke-dashoffset:-32; } }
      .tg { animation: pulse 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes pulse { 0%,100%{ opacity:.9 } 50%{ opacity:1; } }
      .glow { animation: breathe 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes breathe { 0%,100%{ opacity:.45; transform:scale(1) } 50%{ opacity:.7; transform:scale(1.12) } }
      .srv { animation: blink 2.4s ease-in-out infinite; }
      @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:.35 } }
      .spark { stroke-dasharray: 260; stroke-dashoffset: 260; animation: draw 3s ease-in-out infinite; }
      @keyframes draw { 0%{ stroke-dashoffset:260 } 60%,100%{ stroke-dashoffset:0 } }
      .title { fill:#e8e9f0; font-size:44px; font-weight:800; }
      .sub { fill:#8a8fa3; font-size:18px; }
      .chip { fill:#171928; stroke:#2a2d3e; }
      .chipt { fill:#c9ccdb; font-size:13px; font-weight:600; }
      .mark { fill:#ff6d5a; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="380" fill="#0c0d14"/>
  <rect width="1200" height="380" fill="url(#dots)"/>
  <rect width="620" height="380" fill="#0c0d14" opacity="0.55"/>

  <!-- left: title -->
  <g transform="translate(64,132)">
    <g transform="translate(0,-34)">
      <rect x="0" y="0" width="46" height="46" rx="12" fill="rgba(255,109,90,0.14)"/>
      <path d="M23 12 L34 23 L23 34 L12 23 Z" class="mark"/>
    </g>
    <text class="title" x="64" y="6">AWS Topology Monitor</text>
    <text class="sub" x="64" y="40">Visualize &amp; monitor your AWS infrastructure — live.</text>

    <!-- chips -->
    <g transform="translate(64,74)">
      <g><rect class="chip" x="0" y="0" width="118" height="30" rx="15"/><text class="chipt" x="16" y="20">Neural · Radial</text></g>
      <g transform="translate(130,0)"><rect class="chip" x="0" y="0" width="150" height="30" rx="15"/><text class="chipt" x="16" y="20">RDS · EC2 · Cache</text></g>
      <g transform="translate(292,0)"><rect class="chip" x="0" y="0" width="126" height="30" rx="15"/><text class="chipt" x="16" y="20">CloudWatch · Prom</text></g>
    </g>

    <!-- tiny animated sparkline -->
    <g transform="translate(64,128)">
      <text class="sub" x="0" y="6" font-size="12" fill="#38d39f">● live metrics</text>
      <path class="spark" d="M96 4 L118 -8 L140 2 L162 -12 L184 -2 L206 -16 L228 -6 L250 -14"
            fill="none" stroke="#38d39f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- right: topology -->
  <g transform="translate(0,0)">
    <!-- ELB glow + pill -->
    <circle class="glow" cx="700" cy="192" r="46" fill="url(#elbGlow)"/>
    <g>
      <rect x="636" y="164" width="150" height="58" rx="29" fill="url(#elbPill)" stroke="#4a2b30"/>
      <circle cx="668" cy="193" r="17" fill="url(#elbDot)"/>
      <path d="M662 193 h12 M668 187 v12" stroke="#2a1b1f" stroke-width="2.4" stroke-linecap="round"/>
      <text x="694" y="189" fill="#e8e9f0" font-size="14" font-weight="700">prod-alb</text>
      <text x="694" y="206" fill="#8a8fa3" font-size="10.5">internet-facing</text>
    </g>

    <!-- edges ELB -> target groups (flowing) -->
    <path class="edge" d="M786 193 C860 150, 880 96, 946 92"  style="animation-delay:0s"/>
    <path class="edge" d="M786 193 C860 172, 880 160, 946 158" style="animation-delay:.15s"/>
    <path class="edge" d="M786 193 C860 214, 880 226, 946 226" style="animation-delay:.3s"/>
    <path class="edge" d="M786 193 C860 236, 880 296, 946 300" style="animation-delay:.45s"/>

    <!-- target groups + servers -->
    <!-- row helper: each TG a purple circle with number, 2 green servers -->
    <g>
      <!-- tg1 -->
      <circle class="tg" cx="968" cy="92" r="22" fill="url(#tg)"/>
      <text x="968" y="98" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">3</text>
      <path class="slink" d="M990 92 H1052"/><path class="slink" d="M990 92 H1052"/>
      <circle class="srv" cx="1062" cy="80" r="6.5" fill="#38d39f" style="animation-delay:.1s"/>
      <circle class="srv" cx="1062" cy="104" r="6.5" fill="#38d39f" style="animation-delay:.6s"/>
      <line class="slink" x1="990" y1="86" x2="1056" y2="80"/>
      <line class="slink" x1="990" y1="98" x2="1056" y2="104"/>

      <!-- tg2 -->
      <circle class="tg" cx="968" cy="158" r="22" fill="url(#tg)" style="animation-delay:.4s"/>
      <text x="968" y="164" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">2</text>
      <circle class="srv" cx="1062" cy="150" r="6.5" fill="#38d39f" style="animation-delay:.3s"/>
      <circle class="srv" cx="1062" cy="172" r="6.5" fill="#ffb547" style="animation-delay:.9s"/>
      <line class="slink" x1="990" y1="154" x2="1056" y2="150"/>
      <line class="slink" x1="990" y1="164" x2="1056" y2="172"/>

      <!-- tg3 -->
      <circle class="tg" cx="968" cy="226" r="22" fill="url(#tg)" style="animation-delay:.8s"/>
      <text x="968" y="232" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">2</text>
      <circle class="srv" cx="1062" cy="218" r="6.5" fill="#38d39f" style="animation-delay:.5s"/>
      <circle class="srv" cx="1062" cy="240" r="6.5" fill="#38d39f" style="animation-delay:1.1s"/>
      <line class="slink" x1="990" y1="222" x2="1056" y2="218"/>
      <line class="slink" x1="990" y1="232" x2="1056" y2="240"/>

      <!-- tg4 (data point / cache) -->
      <circle class="tg" cx="968" cy="300" r="22" fill="url(#tg)" style="animation-delay:1.2s"/>
      <text x="968" y="306" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">4</text>
      <circle class="srv" cx="1062" cy="292" r="6.5" fill="#38d39f" style="animation-delay:.2s"/>
      <circle class="srv" cx="1062" cy="314" r="6.5" fill="#38d39f" style="animation-delay:.8s"/>
      <line class="slink" x1="990" y1="296" x2="1056" y2="292"/>
      <line class="slink" x1="990" y1="306" x2="1056" y2="314"/>
    </g>
  </g>
</svg>
